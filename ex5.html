<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Three.js - Robot Kitchen XR Teleoperation</title>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        #c {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
</body>
<script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/"
    }
  }
</script>

<script type="module">
import {
    initializeScene,
    loadTextures,
    createEnvironment,
    createRobot,
    setCameraTarget,
    createLights,
    addLightControls,
    addMaterialControls,
    addRobotJointControls,
    setupXRKitchenExperience
} from './script.js';

function main() {
    const { renderer, scene, camera, controls, gui } = initializeScene('#c', true, true);

    const textures = loadTextures();
    const lights = createLights(scene, true);
    const environment = createEnvironment(scene, textures, true);
    const robotData = createRobot(scene, textures, true, true);

    setCameraTarget(controls, { x: 0, y: 0.5, z: 0.75 });

    addLightControls(gui, lights);
    addMaterialControls(gui, robotData, environment);
    addRobotJointControls(gui, robotData);

    const xrExperience = setupXRKitchenExperience({
        renderer,
        scene,
        camera,
        controls,
        gui,
        environment,
        robotData,
        lights
    });

    renderer.setAnimationLoop(() => {
        if (!xrExperience.tick()) return;

        renderer.render(scene, camera);
    });

}

main();
</script>

</html>
