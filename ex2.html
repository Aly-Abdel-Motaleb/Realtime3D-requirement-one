<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Three.js - Scenegraph - Sun Earth</title>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        #c {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
</body>
<script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/"    }
  }
</script>

<script type="module">
import { initializeScene, loadTextures, createEnvironment, createRobot, setCameraTarget , createLights } from './script.js';

async function main() {
    const { renderer, scene, camera, controls } = await initializeScene('#c');
    const textures = loadTextures();
    createEnvironment(scene, textures);
    createRobot(scene, textures, true);
    createLights(scene);
    setCameraTarget(controls, { x: 0, y: 0, z: 2 });

    function render(time) {
        renderer.render(scene, camera);
        requestAnimationFrame(render);
        controls.update();
    }

    requestAnimationFrame(render);
}

main();
</script>

</html>
